        <path d="M15 28 C5 22 1 16 1 11 C1 6 5 3 9 3 C12 3 14 5 15 8 C16 5 18 3 21 3 C25 3 29 6 29 11 C29 16 25 22 15 28 Z" fill="url(#smallheart)"/>
    </g>

    <g transform="translate(420,60)">
        <path d="M20 38 C8 30 2 22 2 14 C2 8 7 4 12 4 C16 4 19 7 20 11 C21 7 24 4 28 4 C33 4 38 8 38 14 C38 22 32 30 20 38 Z" fill="url(#smallheart)"/>
    </g>

    <g transform="translate(60,310)">
        <path d="M18 32 C7 26 2 20 2 13 C2 7 7 4 11 4 C14 4 17 6 18 9 C19 6 22 4 25 4 C29 4 34 7 34 13 C34 20 29 26 18 32 Z" fill="url(#smallheart)" opacity="0.85"/>
    </g>

    <g transform="translate(440,330)">
        <path d="M14 24 C5 19 1 14 1 9 C1 5 5 3 8 3 C11 3 13 5 14 7 C15 5 17 3 20 3 C23 3 27 5 27 9 C27 14 23 19 14 24 Z" fill="url(#smallheart)" opacity="0.8"/>
    </g>

    <!-- Decorative dots -->
    <circle cx="40" cy="200" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="480" cy="220" r="6" fill="#c2185b" opacity="0.4"/>
    <circle cx="100" cy="380" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="380" cy="380" r="5" fill="#ec407a" opacity="0.45"/>

    <!-- Sparkles -->
    <g fill="#f59e0b" opacity="0.85">
        <path d="M250 30 L252 36 L258 38 L252 40 L250 46 L248 40 L242 38 L248 36 Z"/>
        <path d="M460 280 L462 285 L467 287 L462 289 L460 294 L458 289 L453 287 L458 285 Z"/>
