    </defs>
    <rect width="520" height="420" rx="24" fill="url(#bg)"/>

    <!-- Big interlocking heart -->
    <g transform="translate(150,80) scale(1.5)">
        <path d="M70 130 C30 100 14 75 14 55 C14 33 28 22 42 22 C52 22 62 28 70 40 C78 28 88 22 98 22 C112 22 126 33 126 55 C126 75 110 100 70 130 Z" fill="url(#bigheart)"/>
        <path d="M40 50 C40 42 44 38 50 38" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.45"/>
    </g>

    <!-- Floating small hearts -->
