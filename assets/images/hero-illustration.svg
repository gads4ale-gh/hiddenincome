<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="520" height="420">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#dbeafe"/>
            <stop offset="100%" stop-color="#eef4ff"/>
        </linearGradient>
    </defs>
    <rect width="520" height="420" rx="24" fill="url(#bg)"/>

    <!-- Trophy -->
    <g transform="translate(180,80)">
        <rect x="60" y="170" width="40" height="14" rx="3" fill="#0f6cf5"/>
        <rect x="40" y="184" width="80" height="10" rx="3" fill="#0a52c2"/>
        <path d="M50 30 L110 30 L108 110 Q80 140 52 110 Z" fill="#ff7a00"/>
        <path d="M50 30 L110 30 L108 50 L52 50 Z" fill="#ffa54a"/>
        <rect x="74" y="140" width="12" height="34" fill="#ff7a00"/>
        <path d="M50 40 Q20 50 30 90 Q35 100 50 95" stroke="#ff7a00" stroke-width="6" fill="none"/>
        <path d="M110 40 Q140 50 130 90 Q125 100 110 95" stroke="#ff7a00" stroke-width="6" fill="none"/>
        <text x="80" y="90" font-family="-apple-system, Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">★</text>
    </g>

    <!-- Dumbbell -->
    <g transform="translate(60,260)">
        <rect x="0" y="10" width="14" height="40" rx="3" fill="#1a1f2c"/>
        <rect x="14" y="20" width="80" height="20" rx="4" fill="#4a5260"/>
        <rect x="94" y="10" width="14" height="40" rx="3" fill="#1a1f2c"/>
    </g>

    <!-- Running shoe (simple) -->
    <g transform="translate(330,300)">
        <path d="M0 30 Q10 0 50 5 L80 10 Q120 16 130 35 L130 50 L0 50 Z" fill="#0f6cf5"/>
        <path d="M30 30 L40 18 M50 30 L58 16 M70 30 L76 18" stroke="#ffffff" stroke-width="3"/>
        <ellipse cx="20" cy="50" rx="14" ry="6" fill="#0a52c2"/>
        <ellipse cx="110" cy="50" rx="14" ry="6" fill="#0a52c2"/>
    </g>

    <!-- Decorative dots -->
    <circle cx="40" cy="60" r="6" fill="#ff7a00" opacity="0.6"/>
    <circle cx="480" cy="80" r="8" fill="#0f6cf5" opacity="0.4"/>
    <circle cx="460" cy="380" r="10" fill="#ff7a00" opacity="0.4"/>
</svg>
